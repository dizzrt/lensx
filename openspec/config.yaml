schema: spec-driven

context: |
  lensX is a lightweight desktop productivity launcher built with Rust, Tauri 2,
  Vue 3, TypeScript, and Rsbuild.

  Product direction:
  - Prioritize fast global activation, low resident resource usage,
    keyboard-first interaction, and a clear foundation for local commands and
    future extension points.
  - The current codebase is an early launcher scaffold with a Tauri desktop
    shell, tray setup, global shortcut setup, a compact main window, and a basic
    Vue input interface.
  - Do not describe command registry, search indexing, extension runtime,
    synchronization, or other larger capabilities as shipped product behavior
    unless they are implemented in the repository.

  Tech stack:
  - Desktop runtime: Tauri 2.
  - System layer: Rust.
  - Frontend: Vue 3 and TypeScript.
  - Build tool: Rsbuild / Rspack.
  - UI and styles: Naive UI, UnoCSS, Less, and PostCSS.
  - Package manager: pnpm.
  - Formatting and linting: Biome.
  - Python environment management: uv.

  Frontend requirements:
  - Naive UI is the default UI implementation layer for frontend work.
  - Use Naive UI components, providers, theme tokens, and locale support before
    creating custom widgets or custom interaction primitives.
  - Use UnoCSS for static layout, spacing, sizing, display, flex/grid, and
    repeated page skeletons.
  - Use Less for longer semantic style blocks, pseudo classes, media queries,
    theme binding, and component-specific styling that is not cleanly expressed
    with utilities.
  - Do not add ordinary component CSS files unless there is a clear framework or
    tooling reason; UnoCSS and Less are the project styling surface.
  - Frontend UI must support Naive UI-compatible light and dark modes. Avoid
    hard-coded light-only colors; use Naive UI tokens or project theme variables
    where practical.
  - Frontend UI must support application i18n. User-facing text in components,
    dialogs, notifications, empty states, errors, menus, and settings must be
    translatable instead of hard-coded.
  - Use Naive UI locale and dateLocale for Naive UI built-in component text and
    date formatting, but do not treat them as a replacement for the application
    i18n layer that owns product copy.
  - The application locale must be the single source of truth that drives both
    product-owned i18n messages and Naive UI locale / dateLocale.

  Architecture preferences:
  - Keep Tauri commands thin, typed, and stable.
  - Put system integration, window lifecycle behavior, shortcuts, persistence,
    file/process access, indexing, and performance-sensitive work in Rust when
    practical.
  - Keep Vue responsible for presentation, interaction state, and view
    composition.
  - Keep business orchestration separate from outbound system adapters.
  - Prefer gateway-suffixed names for outbound ports and adapters.
  - Prefer business-oriented names and explicit data contracts.
  - Use snake_case for API payload fields crossing the frontend/Rust boundary.

  Documentation ownership:
  - AGENTS.md files are agent-facing and must be written in English.
  - openspec/config.yaml must be written in English.
  - README.md is the English developer entry.
  - README-zh.md is the Simplified Chinese developer entry and must stay aligned
    with README.md.
  - docs/index.md is the only documentation entry index and may be bilingual.
  - docs/en and docs/zh must remain fully mirrored.
  - Every Markdown document under docs/en must have a matching Simplified Chinese
    document under docs/zh with the same relative path, and vice versa.
  - Do not create docs/en/index.md or docs/zh/index.md unless the mirrored
    structure changes through an explicit project decision.
  - Do not create placeholder category index files under docs/en/** or docs/zh/**;
    route categories and topic links from docs/index.md.

  Temporary reference material:
  - tmp/ may contain temporary documents, examples, cases, or notes supplied to
    help agents understand intent.
  - tmp/ is not a stable project source and is not expected to be tracked by Git.
  - OpenSpec artifacts, committed documentation, code comments, and specs must
    not directly cite tmp/ file names, local paths, or document identities.
  - Restate useful temporary information as project-owned requirements,
    constraints, or decisions.

  Python environment:
  - Run Python commands through uv run ...
  - Add Python dependencies through uv add ...
  - Agents may use uv add directly when a required dependency is missing.
  - Do not use direct python, pip, or pip install commands unless the user
    explicitly approves an exception.

rules:
  proposal:
    - Write proposals in Chinese unless the user explicitly requests another language.
    - State the problem, scope, non-goals, affected modules, and expected outcome.
    - Identify whether the change touches frontend UI, Rust/Tauri desktop behavior, documentation, OpenSpec artifacts, tooling, or Python helper scripts.
    - For frontend UI changes, state how the change follows the Naive UI-first, UnoCSS/Less styling, dark-mode, application i18n, and Naive UI locale/dateLocale synchronization requirements.
    - Do not claim planned capabilities as implemented behavior.
    - Do not reference tmp/ file names, paths, or temporary document identities.
  design:
    - Write designs in Chinese unless the user explicitly requests another language.
    - Describe Rust/Tauri/Vue boundaries, data flow, command contracts, lifecycle ownership, and key trade-offs.
    - For frontend designs, describe the Naive UI provider/component usage, theme and dark-mode strategy, application i18n message ownership, Naive UI locale/dateLocale synchronization, and UnoCSS/Less styling boundaries.
    - Keep Tauri command contracts explicit and stable.
    - Call out security, permission, filesystem, process, shortcut, tray, and window lifecycle impacts when affected.
    - Record documentation mirror impacts when docs/ or README files are affected.
    - Do not reference tmp/ file names, paths, or temporary document identities.
  specs:
    - Write capability specs and scenarios in Chinese unless the user explicitly requests another language.
    - Use stable, testable requirement language with SHALL or MUST.
    - Include observable dark-mode, application i18n, and Naive UI locale/dateLocale synchronization behavior when a requirement affects user-facing frontend UI.
    - Include at least one observable scenario per requirement.
    - Keep requirements tied to implemented or proposed behavior, not transient planning notes.
    - Do not reference tmp/ file names, paths, or temporary document identities.
  tasks:
    - Write tasks in Chinese unless the user explicitly requests another language.
    - Break work into small checkbox tasks ordered by dependency.
    - For frontend UI work, include tasks for Naive UI integration, UnoCSS/Less styling, dark-mode compatibility, application i18n compatibility, and Naive UI locale/dateLocale synchronization.
    - Include README.md and README-zh.md synchronization tasks when either README changes.
    - Include docs/en and docs/zh mirror checks when docs/ changes.
    - Do not add placeholder category index files under docs/en/** or docs/zh/**.
    - Include validation appropriate to changed files, such as pnpm run build after substantive frontend edits and pnpm run check or pnpm run format for formatting-sensitive edits.
    - Include uv-based commands for Python helper work.
    - Do not include tasks that depend on tmp/ file names, paths, or temporary document identities.
